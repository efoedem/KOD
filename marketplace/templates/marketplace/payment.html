<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4 text-center">
            <div class="card shadow-lg border-0 rounded-4 p-4">
                <div class="card-body">
                    <h3 class="fw-bold mb-3 text-dark">Secure Payment</h3>
                    <p class="text-muted mb-4">Pay for: <strong>{{ quantity }}x {{ listing.book.title }}</strong></p>

                    <div class="bg-light p-3 rounded-3 mb-4">
                        <small class="text-uppercase text-muted">Amount Due</small>
                        <h2 class="text-success fw-bold">GH₵{{ total_amount|floatformat:2 }}</h2>
                    </div>

                    {% if checkout_url %}
                        <a href="{{ checkout_url }}" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm">
                            Proceed to Payment
                        </a>
                    {% else %}
                        <div class="alert alert-danger">
                            Unable to connect to payment gateway. Please try again later.
                        </div>
                        <a href="{% url 'order_checkout' listing.id %}" class="btn btn-secondary w-100 rounded-pill">Retry</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
