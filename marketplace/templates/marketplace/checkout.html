<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="card-title text-center fw-bold mb-3 text-dark">Checkout Details</h2>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <p class="text-center text-muted mb-4">You're one step away from owning <strong>{{ listing.book.title }}</strong></p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" name="full_name" class="form-control form-control-lg bg-light" placeholder="e.g. Kwaku Edem" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" name="phone_number" class="form-control form-control-lg bg-light" placeholder="059 589 3762" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email <span class="text-muted fw-normal">(Optional)</span></label>
                            <input type="email" name="email" class="form-control form-control-lg bg-light" placeholder="name@example.com">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Number of Copies</label>
                            <input type="number" name="quantity" class="form-control form-control-lg bg-light" value="1" min="1" max="10" required>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm">
                            Continue to Payment
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
