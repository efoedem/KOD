{% extends 'marketplace/base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="text-center fw-bold mb-4">Checkout Details</h2>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" name="full_name" class="form-control form-control-lg bg-light" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" name="phone_number" class="form-control form-control-lg bg-light" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Copies</label>
                            <input type="number" name="quantity" class="form-control form-control-lg bg-light" value="1" min="1" max="10" required>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill">Continue to Payment</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
