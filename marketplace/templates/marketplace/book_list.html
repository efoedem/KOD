{% extends 'marketplace/base.html' %}
{% block content %}
<div class="container py-5">
    <h1 class="mb-4 text-center fw-bold">Available Textbooks</h1>
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        {% for listing in listings %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                    {% if listing.image %}
                        <img src="{{ listing.image.url }}" class="img-fluid" style="width: 100%; height: 100%; object-fit: cover;" alt="{{ listing.book.title }}">
                    {% else %}
                        <div class="text-muted text-center"><i class="bi bi-book fs-1"></i></div>
                    {% endif %}
                </div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold text-truncate">{{ listing.book.title }}</h5>
                    <p class="text-success fw-bold fs-5 mb-3">{{ listing.formatted_price }}</p>
                    <a href="{% url 'order_checkout' listing.id %}" class="btn btn-outline-success w-100 rounded-pill mt-auto">Place Order</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
