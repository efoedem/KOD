<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Textbooks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-success fs-3" href="#">BookMarket</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="{% url 'book_list' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link btn btn-success text-white px-4 rounded-pill ms-lg-3" href="#">My Orders</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-4">
    <form method="GET" action="." class="d-flex justify-content-center">
        <div class="input-group" style="max-width: 600px;">
            <input type="text" name="q" class="form-control rounded-start-pill ps-4"
                   placeholder="Search for books by title..." value="{{ query|default:'' }}">
            <button class="btn btn-success rounded-end-pill px-4" type="submit">Search</button>
        </div>
    </form>
</div>

<div class="container py-5">
    <h1 class="mb-4 text-center">Available Textbooks</h1>
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        {% for listing in listings %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                    {% if listing.image %}
                        <img src="{{ listing.image.url }}" class="img-fluid" style="width: 100%; height: 100%; object-fit: cover;" alt="{{ listing.book.title }}">
                    {% else %}
                        <div class="text-muted text-center">
                            <i class="bi bi-book" style="font-size: 3rem;"></i><br>
                            <small>No Image</small>
                        </div>
                    {% endif %}
                </div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold text-truncate" title="{{ listing.book.title }}">{{ listing.book.title }}</h5>
                    <p class="text-primary fw-bold fs-5 mb-3">{{ listing.formatted_price }}</p>
                    <div class="mt-auto">
                        <a href="{% url 'order_checkout' listing.id %}" class="btn btn-outline-success w-100 rounded-pill">Place Order Now</a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <p class="text-muted">No books are currently available.</p>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
