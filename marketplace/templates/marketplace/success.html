{% extends 'marketplace/base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6">
            <div class="card shadow-sm border-0 p-5 rounded-4 text-center">
                <i class="bi bi-check-circle-fill text-success mb-3" style="font-size: 4rem;"></i>
                <h1 class="fw-bold mb-3">Order Successful!</h1>
                <p class="text-muted">Your order is confirmed and will be ready in 3 days.</p>
                <a href="{% url 'book_list' %}" id="shopLink" class="btn btn-outline-success btn-lg mt-3 rounded-pill">Back to Shop (5s)</a>
            </div>
        </div>
    </div>
</div>
<script>
    let seconds = 5;
    const link = document.getElementById('shopLink');
    setInterval(() => {
        seconds--;
        link.innerText = `Back to Shop (${seconds}s)`;
        if (seconds <= 0) window.location.href = "{% url 'book_list' %}";
    }, 1000);
</script>
{% endblock %}
