<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 p-5 rounded-4">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                </div>

                <h1 class="fw-bold mb-3">Order Successful!</h1>
                <p class="text-muted mb-4">
                    Thank you for your purchase. Your order is confirmed and will be ready for pickup in the <strong>next 3 days</strong>.
                </p>

                <div class="alert alert-light border border-secondary-subtle" role="alert">
                    Check your email for instructions on how to meet the seller.
                </div>

                <a href="{% url 'book_list' %}" class="btn btn-outline-success btn-lg mt-3 rounded-pill px-5">
                    Back to Shop
                </a>
                <script>
    let seconds = 5;
    const button = document.querySelector('a[href="{% url 'book_list' %}"]');

    const interval = setInterval(function() {
        seconds--;
        button.innerText = `Back to Shop (${seconds}s)`;

        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = "{% url 'book_list' %}";
        }
    }, 1000);
</script>
            </div>
        </div>
    </div>
</div>
