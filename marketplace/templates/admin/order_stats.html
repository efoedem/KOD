{% extends "admin/base_site.html" %}

{% block content %}
<div class="module">
    <h2>Book Sales Dashboard</h2>
    <form method="GET">
        <select name="listing_id" onchange="this.form.submit()">
            <option value="">Select a Listing...</option>
            {% for listing in listings %}
                <option value="{{ listing.id }}" {% if selected_listing_id == listing.id %}selected{% endif %}>
                    {{ listing.book.title }} - GH₵ {{ listing.price }}
                </option>
            {% endfor %}
        </select>
    </form>

    {% if stats %}
    <div style="margin-top: 20px;">
        <p><strong>Total Orders:</strong> {{ stats.total_orders }}</p>
        <p><strong>Total Revenue:</strong> GH₵ {{ stats.total_revenue|default:"0.00" }}</p>
    </div>
    {% elif selected_listing_id %}
    <p>No sales recorded for this listing yet.</p>
    {% endif %}
</div>
{% endblock %}
